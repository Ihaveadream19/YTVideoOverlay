name: Build YTVideoOverlay dylib

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install make xz

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      - name: Setup iOS SDK 15.6
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L https://github.com/theos/sdks/releases/download/15.6/iPhoneOS15.6.sdk.tar.xz -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C $HOME/theos/sdks

      - name: Build dylib
        run: |
          make clean
          make

      - name: Collect dylib
        run: |
          mkdir -p output
          find .theos -name "*.dylib" -exec cp {} output/ \;

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: YTVideoOverlay-dylib
          path: output/
